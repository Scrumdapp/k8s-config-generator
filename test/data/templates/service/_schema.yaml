schema:
  name: name_string
  namespace: name_string
  image: docker_image

  replicas:
    _type: number
    _default: 1

  port: number
  port_name:
    _type: name_string
    default: app

  traefik:
    match: string

do:
#  - set: file_prefix
#    to: ${{replace "_" with "-" in name}}
  - copy: service.yaml
    as: "{{name}}-service.yaml"
  - copy: deployment.yaml
    as: "{{name}}-deployment.yaml"
