schema:
  name: name_string
  namespace: name_string
  image: docker_image

  replicas:
    _type: number
    _default: 1

  port: number
  port_name:
    _type: name_string
    _default: app

  traefik:
    match: string

do:
  - set: file_prefix
    to: ${{replace "_" to "-" in name}}
  - copy: service.yaml
    as: {{file_prefix}}-service.yaml
  - copy: deployment.yaml
    as: {{file_prefix}}-deployment.yaml
  - if: [option_exists, traefik]
    do:
      - copy: ingress.yaml
        as: {{file_prefix}}-ingress.yaml
