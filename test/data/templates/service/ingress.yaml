apiVersion: traefik.io/v1
kind: IngressRoute
metadata:
  name: {{name}}-ingress
  #if exists namespace
  namespace: {{namespace}}
  #endif
spec:
  entryPoints:
    - websecure
  routes:
    - match: {{treafik.match}}
      kind: Rule
      services:
        - name: {{name}}
          port: {{port}}
